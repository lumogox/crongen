name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Validate Release Inputs
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: latest

      - name: Validate version alignment
        shell: bash
        run: |
          set -euo pipefail
          bun ./scripts/ci/check-release-version.mjs "${{ github.event_name == 'push' && github.ref_name || '' }}"

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg
            rust_target: aarch64-apple-darwin
          - label: macOS Intel
            runner: macos-latest
            args: --target x86_64-apple-darwin --bundles dmg
            rust_target: x86_64-apple-darwin
          - label: Windows x64
            runner: windows-latest
            args: --bundles nsis
            rust_target: ""
          - label: Linux x64
            runner: ubuntu-22.04
            args: --bundles appimage,deb
            rust_target: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: latest

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

          if [[ -n "${{ matrix.rust_target }}" ]]; then
            rustup target add "${{ matrix.rust_target }}"
          fi

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Prepare macOS signing
        if: runner.os == 'macOS'
        id: macos-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -n "${APPLE_CERTIFICATE:-}" && -n "${APPLE_CERTIFICATE_PASSWORD:-}" && -n "${KEYCHAIN_PASSWORD:-}" ]]; then
            certificate_path="$RUNNER_TEMP/apple-certificate.p12"
            keychain_path="$RUNNER_TEMP/build.keychain-db"

            if ! echo "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path" 2>/dev/null; then
              echo "$APPLE_CERTIFICATE" | base64 -D > "$certificate_path"
            fi

            security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
            security default-keychain -s "$keychain_path"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
            security set-keychain-settings -lut 21600 "$keychain_path"
            security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"

            identity="${APPLE_SIGNING_IDENTITY:-}"
            if [[ -z "$identity" ]]; then
              identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'\"' '/Developer ID Application|Apple Distribution|Apple Development/ { print $2; exit }')"
            fi

            if [[ -z "$identity" ]]; then
              echo "Unable to resolve a macOS signing identity from the imported certificate." >&2
              exit 1
            fi

            echo "identity=$identity" >> "$GITHUB_OUTPUT"
            echo "keychain_path=$keychain_path" >> "$GITHUB_OUTPUT"
          else
            echo "identity=-" >> "$GITHUB_OUTPUT"
            echo "keychain_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare App Store Connect credentials
        if: runner.os == 'macOS'
        id: macos-notarization
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_KEY_CONTENT:-}" ]]; then
            key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
            chmod 600 "$key_path"
            echo "api_key_path=$key_path" >> "$GITHUB_OUTPUT"
          else
            echo "api_key_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release bundles
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@ad5c271a4b5a8bd700bbe6db0d5b4f6ec5de4cb5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.macos-signing.outputs.identity }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.macos-notarization.outputs.api_key_path }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: crongen v__VERSION__
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadUpdaterSignatures: false

      - name: Build dry-run bundles
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@ad5c271a4b5a8bd700bbe6db0d5b4f6ec5de4cb5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ steps.macos-signing.outputs.identity }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ steps.macos-notarization.outputs.api_key_path }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[name]-[version]-[platform]-[arch]-[bundle]"
          uploadUpdaterSignatures: false

      - name: Clean up macOS keychain
        if: always() && runner.os == 'macOS' && steps.macos-signing.outputs.keychain_path != ''
        shell: bash
        run: |
          security delete-keychain "${{ steps.macos-signing.outputs.keychain_path }}" || true
