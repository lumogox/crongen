name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI: true
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Validate Release Inputs
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Validate version alignment
        shell: bash
        run: |
          set -euo pipefail
          bun ./scripts/ci/check-release-version.mjs "${{ github.event_name == 'push' && github.ref_name || '' }}"

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runner: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg --no-sign
            rust_target: aarch64-apple-darwin
            artifact_name: crongen-macos-aarch64-bundle
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle
          - label: macOS Intel
            runner: macos-latest
            args: --target x86_64-apple-darwin --bundles dmg --no-sign
            rust_target: x86_64-apple-darwin
            artifact_name: crongen-macos-x64-bundle
            artifact_path: src-tauri/target/x86_64-apple-darwin/release/bundle
          - label: Windows x64
            runner: windows-latest
            args: --bundles nsis
            rust_target: ""
            artifact_name: crongen-windows-x64-bundle
            artifact_path: src-tauri/target/release/bundle
          - label: Linux x64
            runner: ubuntu-22.04
            args: --bundles appimage,deb
            rust_target: ""
            artifact_name: crongen-linux-x64-bundle
            artifact_path: src-tauri/target/release/bundle

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

          if [[ -n "${{ matrix.rust_target }}" ]]; then
            rustup target add "${{ matrix.rust_target }}"
          fi

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build release bundles
        if: github.event_name == 'push'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bun run tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: crongen v__VERSION__
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false

      - name: Build dry-run bundles
        if: github.event_name == 'workflow_dispatch'
        run: bun run tauri build ${{ matrix.args }}

      - name: Upload dry-run bundles
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
